name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # The payload must be built before the host crate because
      # backseat/build.rs embeds libbackseat_payload.so via include_bytes!.
      - name: Build payload
        run: cargo build -p backseat-payload
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build payload
        run: cargo build -p backseat-payload
      - name: Run unit tests
        run: cargo test -p backseat --lib
      - name: Run doc tests
        run: cargo test -p backseat --doc
      - name: Run integration tests
        # Integration tests are gated on WAYLAND_DISPLAY + ptrace permissions
        # and gracefully skip themselves on CI runners where neither is present.
        run: cargo test -p backseat --test integration -- --ignored
